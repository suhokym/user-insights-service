spring:
  elasticsearch:
    uris: http://localhost:9200

userweblog:
  bulk:
    total: 100000        # 기동 시 생성할 이벤트 총 건수
    batch-size: 5000    # 배치당 처리 건수 (클수록 빠름)
    days: 7             # 생성할 시간 범위 (과거 N일 ~ 현재)
  scheduler:
    enabled: false        # true로 변경하면 실시간 스케줄러 활성화
    fixed-rate-ms: 1000   # 1초마다 이벤트 생성
    users-per-tick: 1000     # 1회 실행 시 생성할 이벤트 수

logging:
  level:
    com.study.userweblog: DEBUG
