apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-log-service
  labels:
    app: event-log-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: event-log-service
  template:
    metadata:
      labels:
        app: event-log-service
    spec:
      containers:
        - name: event-log-service
          image: <AWS_ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/event-log-service:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: event-log-service-config
          env:
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: event-log-service-secret
                  key: db-password
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "3Gi"   # Spark 집계 시 메모리 사용량 고려
              cpu: "1500m"
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 30
