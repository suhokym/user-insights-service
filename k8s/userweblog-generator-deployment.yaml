apiVersion: apps/v1
kind: Deployment
metadata:
  name: userweblog-generator
  labels:
    app: userweblog-generator
spec:
  replicas: 1  # 이벤트 중복 생성 방지를 위해 단일 Pod 유지
  selector:
    matchLabels:
      app: userweblog-generator
  template:
    metadata:
      labels:
        app: userweblog-generator
    spec:
      containers:
        - name: userweblog-generator
          image: <AWS_ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/userweblog-generator:latest
          envFrom:
            - configMapRef:
                name: userweblog-generator-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      restartPolicy: Always  # 장애 시 자동 재시작으로 이벤트 생성 지속
