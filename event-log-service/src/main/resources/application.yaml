spring:
  application:
    name: insights

  elasticsearch:
    uris: http://localhost:9200
    username: elastic
    password: changeme
    connection-timeout: 5s
    socket-timeout: 30s

  datasource:
    url: jdbc:mysql://localhost:3306/insights?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useUnicode=true
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

spark:
  app-name: insights-aggregation
  master: local[*]

logging:
  level:
    org.apache.spark: WARN
    org.apache.hadoop: WARN
    org.sparkproject: WARN
