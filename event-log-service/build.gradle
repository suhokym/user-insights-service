plugins {
	id 'java'
	id 'org.springframework.boot' version '3.5.15-SNAPSHOT'
	id 'io.spring.dependency-management' version '1.1.7'
}

group = 'com.liveclass'
version = '0.0.1-SNAPSHOT'

java {
	sourceCompatibility = JavaVersion.VERSION_17
	targetCompatibility = JavaVersion.VERSION_17
}

repositories {
	mavenCentral()
	maven { url = 'https://repo.spring.io/snapshot' }
}

configurations {
	// Spark가 가져오는 slf4j/log4j 충돌 제거
	all {
		exclude group: 'org.slf4j', module: 'slf4j-log4j12'
		exclude group: 'log4j', module: 'log4j'
		exclude group: 'org.apache.logging.log4j', module: 'log4j-slf4j-impl'
		exclude group: 'org.apache.logging.log4j', module: 'log4j-slf4j2-impl'
		resolutionStrategy {
			force 'org.antlr:antlr4-runtime:4.9.3'
		}
	}
}

dependencies {
	// Spring
	implementation 'org.springframework.boot:spring-boot-starter-data-elasticsearch'
	implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
	implementation 'org.springframework.boot:spring-boot-starter-web'

	// MySQL
	runtimeOnly 'com.mysql:mysql-connector-j'

	// Spark (local mode) - Java 21 호환을 위해 3.5.x 사용
	implementation('org.apache.spark:spark-core_2.12:3.5.1') {
		exclude group: 'org.apache.hadoop', module: 'hadoop-client-runtime'
	}
	implementation 'org.apache.spark:spark-sql_2.12:3.5.1'

	// Spark 3.x 는 javax.servlet (EE 8) 을 사용하므로 Spring Boot 3 환경에서 명시적으로 추가
	implementation 'javax.servlet:javax.servlet-api:4.0.1'

	// Lombok
	compileOnly 'org.projectlombok:lombok'
	annotationProcessor 'org.projectlombok:lombok'
	testImplementation 'org.springframework.boot:spring-boot-starter-test'
	testCompileOnly 'org.projectlombok:lombok'
	testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
	testAnnotationProcessor 'org.projectlombok:lombok'
}

tasks.named('test') {
	enabled = false
}

// Java 21 + Spark 모듈 시스템 호환성
tasks.withType(JavaExec).configureEach {
	jvmArgs(
			'--add-exports=java.base/sun.nio.ch=ALL-UNNAMED',  // ← 추가
			'--add-opens=java.base/java.lang=ALL-UNNAMED',
			'--add-opens=java.base/java.util=ALL-UNNAMED',
			'--add-opens=java.base/java.io=ALL-UNNAMED',
			'--add-opens=java.base/sun.nio.ch=ALL-UNNAMED',
			'--add-opens=java.base/java.nio=ALL-UNNAMED',
			'--add-opens=java.base/java.lang.invoke=ALL-UNNAMED'  // ← 추가
	)
}

bootRun {
	jvmArgs(
			'--add-exports=java.base/sun.nio.ch=ALL-UNNAMED',  // ← 추가
			'--add-opens=java.base/java.lang=ALL-UNNAMED',
			'--add-opens=java.base/java.util=ALL-UNNAMED',
			'--add-opens=java.base/java.io=ALL-UNNAMED',
			'--add-opens=java.base/sun.nio.ch=ALL-UNNAMED',
			'--add-opens=java.base/java.nio=ALL-UNNAMED',
			'--add-opens=java.base/java.lang.invoke=ALL-UNNAMED'  // ← 추가
	)
}